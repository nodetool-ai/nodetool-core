name: Hourly Assistant Features

on:
  schedule:
    - cron: "45 */6 * * *" # Every 6 hours

jobs:
  assistant:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all branches

      - name: Create feature branch
        run: |
          git fetch origin main
          git checkout -b assistant/features-$(date +%Y%m%d-%H%M%S) origin/main

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Assistant
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
        with:
          anthropic_api_key: ${{ secrets.ZAI_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Bash,WebFetch,Edit,Read,Replace"
          prompt: |
            # NodeTool Core Feature Development (Scheduled)

            You are an autonomous agent adding ONE focused feature to **nodetool-core**.

            ## Step 0: Check Backlog (STOP if too many open PRs)
            1. Run `gh pr list --state open --author "claude[bot]" --limit 100` to count open Claude PRs.
            2. If there are 5 or more open PRs, **stop immediately** — do not create another PR until the backlog is cleared.
            3. Run `git branch -a` to check existing branches; continue related branches instead of creating new ones.

            ## Step 1: Read Memory (Required)
            - `.github/opencode-memory/README.md`
            - `.github/opencode-memory/repository-context.md`
            - `.github/opencode-memory/features.md`
            - List `issues/` and `insights/` to find descriptive files

            ## Step 2: Feature Selection (Issue-Driven ONLY)
            Features must be explicitly requested — do NOT invent new utilities or abstractions speculatively.

            1. Run `gh issue list --state open --label "enhancement" --limit 20` to see open feature requests.
            2. Also run `gh issue list --state open --limit 30` to check for any untagged feature requests.
            3. Search the codebase for `TODO` and `FIXME` comments: `grep -rn "TODO\|FIXME" src/nodetool/ --include="*.py" | head -30`
            4. Choose ONE of:
               a. An open GitHub issue explicitly requesting a feature, OR
               b. A `TODO`/`FIXME` comment that describes a missing feature
            5. **If no explicit issue or TODO/FIXME exists**, do not add any feature. Stop without making changes.
            6. Before implementing, run `gh pr list --state open --search "<feature keyword>"` to confirm no existing PR covers it.

            ## Step 3: Implementation Guidelines
            - Stay within core Python architecture
            - Follow async-first patterns and DI conventions
            - Avoid unrelated refactors
            - Keep changes minimal and focused

            ## Step 4: Quality Bar
            ```bash
            make typecheck
            make lint
            make test
            ```

            ## Step 5: Update Memory
            - Add feature line in `.github/opencode-memory/features.md`
            - Add insight files under `insights/<topic>/`
            - Add issue files under `issues/<topic>/` if needed

            ## Pull Request Rule
            - NEVER commit or push directly to the main branch.
            - Always work on the current feature branch (not main).
            - Do NOT run `git checkout main` or `git switch main`.
            - If `git status --porcelain` shows changed files, commit, push the current branch, and create or update a PR targeting main.
            - If there are no file changes, do not commit, do not push, and do not create or update a PR.
