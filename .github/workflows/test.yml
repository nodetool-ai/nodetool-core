name: Test nodetool-core

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Manual trigger
    inputs:
      run_docker_integration:
        description: "Run Docker integration tests (requires Docker image build)"
        required: false
        default: "false"
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: |
          uv run pytest -n auto -v \
            --ignore=tests/workflows/test_docker_job_execution.py \
            --ignore=tests/workflows/test_job_execution_manager.py \
            --ignore=tests/workflows/test_job_execution.py \
            --ignore=tests/workflows/test_threaded_job_execution.py \
            --ignore=tests/workflows/test_subprocess_job_execution.py

  # Optional: smoke-test the Docker image (PyPI-based worker) if explicitly requested
  docker-integration:
    runs-on: ubuntu-latest
    if: github.event.inputs.run_docker_integration == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag nodetool:local \
            --file Dockerfile \
            .

      - name: Start NodeTool worker container
        run: |
          docker run -d \
            --name nodetool-test-integration \
            -p 8777:7777 \
            -e ENV=test \
            nodetool:local

      - name: Wait for worker port to accept connections
        run: |
          timeout 90s bash -c '
            until python -c "import socket; socket.create_connection((\"127.0.0.1\", 8777), timeout=3).close()" 2>/dev/null; do
              echo "Waiting for worker..."
              sleep 2
            done
          '
          echo "Worker is accepting connections."

      - name: Dump container logs
        if: always()
        run: docker logs nodetool-test-integration || true

      - name: Cleanup container
        if: always()
        run: |
          docker stop nodetool-test-integration || true
          docker rm nodetool-test-integration || true
