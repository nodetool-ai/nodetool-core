name: TS Parity Harness

on:
  pull_request:
    paths:
      - "ts/**"
      - "scripts/export_parity_snapshot.py"
      - "src/**"
      - ".github/workflows/ts-parity-harness.yml"
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  parity-harness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        working-directory: .
        run: uv sync --all-extras --dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build TS workspaces
        run: npm run build

      - name: Run parity harness tests (including cross-language checks)
        run: npm --workspace @nodetool/parity-harness run test

      - name: Export Python parity snapshot
        working-directory: .
        run: uv run python scripts/export_parity_snapshot.py > ts/parity-snapshot.json

      - name: Upload parity snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-snapshot
          path: ts/parity-snapshot.json

      - name: Generate sample shadow report
        run: |
          npm --workspace @nodetool/parity-harness run build
          node packages/parity-harness/dist/cli.js \
            --python "node -e console.log(JSON.stringify({type:'job_update',status:'running'}))" \
            --ts "node -e console.log(JSON.stringify({type:'job_update',status:'running'}))" \
            > parity-shadow-report.json

      - name: Upload shadow report artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-shadow-report
          path: ts/parity-shadow-report.json
