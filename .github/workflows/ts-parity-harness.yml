name: TS Parity Harness

on:
  pull_request:
    paths:
      - "ts/**"
      - "scripts/export_parity_snapshot.py"
      - "src/**"
      - ".github/workflows/ts-parity-harness.yml"
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  parity-harness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        working-directory: .
        run: uv sync --all-extras --dev

      - name: Export Python parity snapshot
        working-directory: .
        run: uv run python scripts/export_parity_snapshot.py > parity-snapshot.json

      - name: Upload parity snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-snapshot
          path: parity-snapshot.json
